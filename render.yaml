services:
  # 1. Backend Java Spring Boot Web Service
  - type: web
    name: university-java-backend
    env: java
    region: oregon
    rootDir: spring-boot-backend
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: university-db
          property: connectionString

  # 2. Frontend React (Vite) Static Site
  - type: web
    name: university-frontend
    env: static
    staticPublishPath: dist
    buildCommand: npm run build
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: university-java-backend
          property: host

# 3. Managed Database
databases:
  - name: university-db
    plan: free
    region: oregon
